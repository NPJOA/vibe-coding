<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROKIT Healthcare - 내 첫번째 아이디어</title>
    <!-- 폰트: 프리텐다드 사용 -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
            /* 신뢰를 주는 파란색(Trust Blue) 그라데이션 배경 */
            background: linear-gradient(135deg, #0a2342, #004d99, #007bff); 
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* 배경 장식 요소 (바이오/테크 느낌의 미세한 패턴/빛) */
        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 70%);
            top: -100px;
            left: -100px;
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
        }
        
        .bg-glow-2 {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(0, 195, 255, 0.15) 0%, rgba(255,255,255,0) 70%);
            bottom: -200px;
            right: -200px;
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
        }

        /* 상단 네비게이션 바 (기업 로고 영역) */
        header {
            width: 100%;
            padding: 24px 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            background: rgba(10, 35, 66, 0.2);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 로고 앞쪽 포인트 아이콘 (DNA/의료를 상징하는 형태) */
        .logo::before {
            content: '';
            display: block;
            width: 24px;
            height: 24px;
            background: #00d2ff; /* 밝은 하늘색 포인트 */
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.8), 10px 0 0 rgba(255, 255, 255, 0.9);
        }

        .nav-links {
            display: flex;
            gap: 32px;
            font-size: 0.95rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.8);
        }
        
        .nav-links span:hover {
            color: #ffffff;
            cursor: pointer;
            transition: color 0.2s;
        }

        /* 메인 콘텐츠 영역 */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 20px;
        }

        .container {
            text-align: center;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            padding: 60px 80px;
            border-radius: 24px;
            /* 신뢰감 있는 푸른빛의 글래스모피즘 */
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            border-left: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .subtitle {
            font-size: 1.1rem;
            font-weight: 500;
            color: #00d2ff;
            margin-bottom: 16px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        h1 {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1.2;
            color: #ffffff;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            margin-bottom: 24px;
        }

        .description {
            font-size: 1.2rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.85);
            max-width: 500px;
            margin: 0 auto 32px;
            line-height: 1.6;
        }

        /* 혁신적인 느낌의 버튼 */
        .btn {
            display: inline-block;
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #004d99;
            background: #ffffff;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: #f0f8ff;
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.2);
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 하단 장식선 */
        .bottom-line {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #00d2ff, #007bff, #0a2342);
            z-index: 10;
        }

        @media (max-width: 768px) {
            header {
                padding: 16px 24px;
            }
            .nav-links {
                display: none;
            }
            h1 {
                font-size: 2.5rem;
            }
            .container {
                padding: 40px 20px;
                margin: 0 20px;
            }
            .description {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <header>
        <div class="logo">ROKIT HEALTHCARE</div>
        <div class="nav-links">
            <span>회사소개</span>
            <span>장기재생</span>
            <span>역노화</span>
            <span>R&D</span>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="subtitle">Next Generation Healthcare</div>
            <h1>내 첫번째 아이디어</h1>
            <p class="description">생명공학과 3D 바이오프린팅 기술을 통해<br>새로운 미래 의료 혁신을 시작합니다.</p>
            <button class="btn">자세히 보기</button>
        </div>
    </main>
    
    <div class="bottom-line"></div>
</body>
</html>
